<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Menu - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

<div class="min-h-screen flex">
    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:block">
        <div class="p-6 text-xl font-bold border-b border-gray-800">Dapur Admin</div>
        <nav class="mt-6">
            <a href="/admin/index.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gauge w-6"></i> Dashboard</a>
            <a href="/admin/posts.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-newspaper w-6"></i> Semua Post</a>
            <a href="/admin/pages.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-file-lines w-6"></i> Semua Halaman</a>
            <a href="/admin/testimonials.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-quote-right w-6"></i> Testimoni</a>
            <a href="/admin/menus.html" class="block py-3 px-6 bg-gray-700 text-white border-l-4 border-emerald-500"><i class="fa-solid fa-bars w-6"></i> Pengaturan Menu</a>
            <a href="/admin/settings.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gear w-6"></i> Pengaturan Situs</a>
            <div class="mt-6 pt-6 border-t border-gray-800">
                <a href="/" class="block py-3 px-6 text-gray-400 hover:text-white hover:bg-gray-800">← Lihat Website</a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="max-w-4xl mx-auto space-y-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-xl font-bold text-gray-900 mb-6">Tambah Menu Item</h2>
                <form id="menu-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Label Menu</label>
                            <input type="text" id="title" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Contoh: Tentang Kami">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">URL / Link</label>
                            <input type="text" id="url" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="https://... atau /page/...">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Induk (Parent)</label>
                        <select id="parentId" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                            <option value="">-- Menu Utama (Top Level) --</option>
                        </select>
                        <p class="text-xs text-gray-500 mt-1">Pilih menu lain jika ingin menjadikan item ini sebagai sub-menu.</p>
                    </div>
                    <button type="submit" class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Tambah Menu</button>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-xl font-bold text-gray-900 mb-6">Struktur Menu Saat Ini</h2>
                <div id="menu-list" class="space-y-4"></div>
            </div>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('menu-form');
        const menuList = document.getElementById('menu-list');
        const parentSelect = document.getElementById('parentId');
        
        let menus = JSON.parse(localStorage.getItem('siteMenus') || '[]');

        const render = () => {
            menuList.innerHTML = menus.length ? '' : '<p class="text-gray-500 text-center">Belum ada menu.</p>';
            parentSelect.innerHTML = '<option value="">-- Menu Utama (Top Level) --</option>';

            // Filter top level menus
            const topLevel = menus.filter(m => !m.parentId);
            
            topLevel.forEach(m => {
                // Add to select option
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.title;
                parentSelect.appendChild(option);

                // Render menu item
                const div = document.createElement('div');
                div.className = 'border rounded-lg p-3 bg-gray-50';
                
                // Find children
                const children = menus.filter(c => c.parentId == m.id);
                const childrenHtml = children.map(c => `
                    <div class="flex justify-between items-center text-sm p-2 bg-white rounded shadow-sm mt-2 ml-6 border-l-2 border-gray-200">
                        <div>${c.title} <span class="text-xs text-gray-400">(${c.url})</span></div>
                        <button onclick="deleteMenu(${c.id})" class="text-red-400 hover:text-red-600 text-xs">Hapus</button>
                    </div>
                `).join('');

                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <div class="font-bold text-gray-800">${m.title} <span class="text-xs font-normal text-gray-500">(${m.url})</span></div>
                        <button onclick="deleteMenu(${m.id})" class="text-red-500 text-sm hover:text-red-700">Hapus</button>
                    </div>
                    ${childrenHtml}
                `;
                menuList.appendChild(div);
            });
        };

        window.deleteMenu = (id) => {
            if(confirm('Hapus menu ini?')) {
                menus = menus.filter(m => m.id !== id && m.parentId !== id);
                localStorage.setItem('siteMenus', JSON.stringify(menus));
                render();
            }
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                title: document.getElementById('title').value,
                url: document.getElementById('url').value,
                parentId: document.getElementById('parentId').value ? parseInt(document.getElementById('parentId').value) : null
            };
            menus.push(newItem);
            localStorage.setItem('siteMenus', JSON.stringify(menus));
            form.reset();
            render();
        });

        render();
    });
</script>
</body>
</html>
