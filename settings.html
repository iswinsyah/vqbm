<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Situs - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

<div class="min-h-screen flex">
    <!-- Sidebar (Sama seperti index.html tapi active di Settings) -->
    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:block">
        <div class="p-6 text-xl font-bold border-b border-gray-800">Dapur Admin</div>
        <nav class="mt-6">
            <a href="/admin/index.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gauge w-6"></i> Dashboard</a>
            <a href="/admin/posts.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-newspaper w-6"></i> Semua Post</a>
            <a href="/admin/pages.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-file-lines w-6"></i> Semua Halaman</a>
            <a href="/admin/testimonials.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-quote-right w-6"></i> Testimoni</a>
            <a href="/admin/menus.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-bars w-6"></i> Pengaturan Menu</a>
            <a href="/admin/settings.html" class="block py-3 px-6 bg-gray-700 text-white border-l-4 border-emerald-500"><i class="fa-solid fa-gear w-6"></i> Pengaturan Situs</a>
            <div class="mt-6 pt-6 border-t border-gray-800">
                <a href="/" class="block py-3 px-6 text-gray-400 hover:text-white hover:bg-gray-800">← Lihat Website</a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Pengaturan Situs</h2>
            <form id="settings-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Judul Situs</label>
                    <input type="text" name="title" id="title" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi / Tagline</label>
                    <input type="text" name="description" id="description" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Logo URL</label>
                    <input type="text" name="logo" id="logo" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="https://...">
                </div>
                
                <div class="pt-6 border-t">
                    <h3 class="text-lg font-bold text-emerald-800 mb-4">Warna & Tampilan</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Warna Utama</label>
                            <div class="flex gap-2">
                                <input type="color" name="primaryColor" id="primaryColor" class="h-10 w-12 rounded border cursor-pointer">
                                <input type="text" id="primaryColorText" class="flex-1 px-3 py-2 border rounded-lg text-xs uppercase font-mono" readonly>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Warna Sekunder</label>
                            <div class="flex gap-2">
                                <input type="color" name="secondaryColor" id="secondaryColor" class="h-10 w-12 rounded border cursor-pointer">
                                <input type="text" id="secondaryColorText" class="flex-1 px-3 py-2 border rounded-lg text-xs uppercase font-mono" readonly>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t flex justify-end">
                    <button type="submit" class="bg-emerald-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-emerald-700 shadow-lg transition">
                        Simpan Pengaturan
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const defaultSettings = {
            title: "Villa Quran Baron Malang",
            description: "Pusat Pendidikan Al-Quran Terbaik di Malang",
            logo: "",
            primaryColor: "#064E3B",
            secondaryColor: "#D97706"
        };

        // Load settings
        const currentSettings = JSON.parse(localStorage.getItem('siteSettings')) || defaultSettings;

        // Populate form
        document.getElementById('title').value = currentSettings.title || '';
        document.getElementById('description').value = currentSettings.description || '';
        document.getElementById('logo').value = currentSettings.logo || '';
        
        const pColor = currentSettings.primaryColor || defaultSettings.primaryColor;
        const sColor = currentSettings.secondaryColor || defaultSettings.secondaryColor;
        
        document.getElementById('primaryColor').value = pColor;
        document.getElementById('primaryColorText').value = pColor;
        document.getElementById('secondaryColor').value = sColor;
        document.getElementById('secondaryColorText').value = sColor;

        // Color picker listeners
        document.getElementById('primaryColor').addEventListener('input', (e) => document.getElementById('primaryColorText').value = e.target.value);
        document.getElementById('secondaryColor').addEventListener('input', (e) => document.getElementById('secondaryColorText').value = e.target.value);

        // Save settings
        document.getElementById('settings-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newSettings = { ...currentSettings };
            formData.forEach((value, key) => newSettings[key] = value);
            
            localStorage.setItem('siteSettings', JSON.stringify(newSettings));
            alert('Pengaturan berhasil disimpan!');
        });
    });
</script>
</body>
</html>
