name: Deploy to Hostinger
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🗂️ Susun File Admin & PHP ke folder dist
        run: |
          # 1. Pastikan folder tujuan ada
          mkdir -p dist/admin
          
          # 2. Salin semua file admin dari admin_static
          cp -r admin_static/. dist/admin/
          
          # 3. Salin semua API PHP (termasuk config.php lokal untuk sementara)
          cp *.php dist/ || true
          
          # 4. TIMPA config.php dengan versi produksi dari folder public
          cp public/config.php dist/config.php
          
          # 5. Pastikan file .htaccess ikut terbawa agar routing tidak error
          cp .htaccess dist/ || true

      - name: 🚀 Sync files (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './dist/*'
          # Ganti ke path yang benar di hPanel SFTP/SSH, contoh: /public_html/site_baru/
          remote_path: 'public_html/site_baru/'
          sftp_only: true
          port: 65002