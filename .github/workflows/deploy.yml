name: Deploy to Hostinger
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🗂️ Susun File Admin & PHP ke folder dist
        run: |
          # 1. Pindahkan semua API PHP ke folder root dist
          cp *.php dist/ || true
          
          # 2. Buat folder admin dan kumpulkan semua HTML dashboard ke dalamnya
          mkdir -p dist/admin
          cp index.html posts.html pages.html agents.html menus.html settings.html dist/admin/ || true
          cp src/testimonials.html dist/admin/ || true

      - name: � Sync files (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          protocol: ftp
          port: 21
          # Use 'loose' if strict fails due to certificate issues on shared hosting
          security: loose
          dry-run: false
          dangerous-clean-slate: true