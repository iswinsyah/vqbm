<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Agen - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

<div class="min-h-screen flex">
    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:block">
        <div class="p-6 text-xl font-bold border-b border-gray-800">Dapur Admin</div>
        <nav class="mt-6">
            <a href="index.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gauge w-6"></i> Dashboard</a>
            <a href="spmb.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-user-graduate w-6"></i> Data SPMB (CRM)</a>
            <a href="pipeline.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-table-columns w-6"></i> Pipeline Kanban</a>
            <a href="posts.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-newspaper w-6"></i> Semua Post</a>
            <a href="pages.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-file-lines w-6"></i> Semua Halaman</a>
            <a href="testimonials.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-quote-right w-6"></i> Testimoni</a>
            <a href="agents.html" class="block py-3 px-6 bg-gray-700 text-white border-l-4 border-emerald-500"><i class="fa-solid fa-users w-6"></i> Data Agen</a>
            <a href="menus.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-bars w-6"></i> Pengaturan Menu</a>
            <a href="settings.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gear w-6"></i> Pengaturan Situs</a>
            <div class="mt-6 pt-6 border-t border-gray-800">
                <a href="/" class="block py-3 px-6 text-gray-400 hover:text-white hover:bg-gray-800">← Lihat Website</a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="space-y-8">
            <!-- Form -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-xl font-bold text-gray-900 mb-4">Tambah / Edit Agen</h2>
                <form id="agent-form" class="space-y-4">
                    <input type="hidden" name="id" id="agent-id">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nama Agen</label>
                        <input type="text" name="name" id="name" required class="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nomor WhatsApp</label>
                            <input type="text" name="phone" id="phone" required placeholder="Contoh: 081234567890" class="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Komisi per Closing (Rp)</label>
                            <input type="number" name="commission" id="commission" placeholder="Contoh: 50000 (Bisa dikosongkan)" class="mt-1 w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Simpan</button>
                        <button type="button" id="btn-cancel" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 hidden">Batal</button>
                    </div>
                </form>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-xl font-bold text-gray-900 mb-6">Daftar Agen</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nomor</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nomor WhatsApp</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Komisi / Closing</th>
                                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Jml Closing</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Total Komisi</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="agents-table-body" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('agent-form');
        const tableBody = document.getElementById('agents-table-body');
        const btnCancel = document.getElementById('btn-cancel');
        let agents = [];

        const fetchAgents = async () => {
            try {
                const res = await fetch('../agents.php');
                const data = await res.json();
                
                if (data.error) {
                    let errorHtml = `<div class="text-red-500 font-bold">${data.error}</div>`;
                    if (data.details) errorHtml += `<div class="text-xs text-gray-500 mt-1">Detail: ${data.details}</div>`;
                    if (data.suggestion) errorHtml += `<div class="text-sm text-blue-600 mt-2 p-2 bg-blue-50 rounded">${data.suggestion}</div>`;
                    
                    tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4">${errorHtml}</td></tr>`;
                    return;
                }
                
                agents = data;
                render();
            } catch (err) {
                console.error('Gagal mengambil data:', err);
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-red-500">Gagal terhubung ke API (../agents.php). Pastikan server PHP aktif.</td></tr>';
            }
        };

        const render = () => {
            tableBody.innerHTML = agents.length ? '' : '<tr><td colspan="7" class="text-center py-4 text-gray-500">Belum ada data agen.</td></tr>';
            
            const formatRp = (val) => {
                if (!val || isNaN(val) || val == 0) return '<span class="text-gray-400 italic">Belum diatur</span>';
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);
            };

            agents.forEach((a, index) => {
                const closingCount = a.closing_count || 0; 
                const commissionVal = parseInt(a.commission) || 0;
                const totalCommission = commissionVal * closingCount;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-500">${index + 1}</td>
                    <td class="px-6 py-4 whitespace-nowrap font-medium">${a.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500"><a href="https://wa.me/${a.phone.replace(/[^0-9]/g, '')}" target="_blank" class="text-emerald-600 hover:underline"><i class="fa-brands fa-whatsapp"></i> ${a.phone}</a></td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-500">${formatRp(commissionVal)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center font-bold text-gray-700">${closingCount}</td>
                    <td class="px-6 py-4 whitespace-nowrap font-bold text-emerald-600">${formatRp(totalCommission)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="editAgent(${a.id})" class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
                        <button onclick="deleteAgent(${a.id})" class="text-red-600 hover:text-red-900">Hapus</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        };

        window.editAgent = (id) => {
            const a = agents.find(x => x.id == id);
            if(a) {
                document.getElementById('agent-id').value = a.id;
                document.getElementById('name').value = a.name;
                document.getElementById('phone').value = a.phone;
                document.getElementById('commission').value = a.commission;
                btnCancel.classList.remove('hidden');
                window.scrollTo(0,0);
            }
        };

        window.deleteAgent = async (id) => {
            if(confirm('Hapus agen ini?')) {
                try {
                    const res = await fetch('../agents.php?id=' + id, { method: 'DELETE' });
                    const result = await res.json();
                    if(result.success) {
                        fetchAgents();
                    } else {
                        alert(result.error || 'Gagal menghapus data');
                    }
                } catch(err) {
                    alert('Terjadi kesalahan jaringan atau server PHP tidak merespons.');
                }
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('agent-id').value;
            const agentData = {
                id: id ? parseInt(id) : null,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                commission: document.getElementById('commission').value
            };

            try {
                const res = await fetch('../agents.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(agentData)
                });
                const result = await res.json();
                
                if(result.success) {
                    form.reset();
                    document.getElementById('agent-id').value = '';
                    btnCancel.classList.add('hidden');
                    fetchAgents();
                } else {
                    alert(result.error || 'Gagal menyimpan data');
                }
            } catch (err) {
                alert('Terjadi kesalahan jaringan atau database. Pastikan koneksi database benar.');
            }
        });

        btnCancel.addEventListener('click', () => {
            form.reset();
            document.getElementById('agent-id').value = '';
            btnCancel.classList.add('hidden');
        });

        fetchAgents();
    });
</script>
</body>
</html>
