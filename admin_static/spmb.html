<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data SPMB - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

<div class="min-h-screen flex">
    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:block">
        <div class="p-6 text-xl font-bold border-b border-gray-800">Dapur Admin</div>
        <nav class="mt-6">
            <a href="index.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gauge w-6"></i> Dashboard</a>
            <a href="spmb.html" class="block py-3 px-6 bg-gray-700 text-white border-l-4 border-emerald-500"><i class="fa-solid fa-user-graduate w-6"></i> Data SPMB (CRM)</a>
            <a href="pipeline.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-table-columns w-6"></i> Pipeline Kanban</a>
            <a href="posts.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-newspaper w-6"></i> Semua Post</a>
            <a href="pages.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-file-lines w-6"></i> Semua Halaman</a>
            <a href="testimonials.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-quote-right w-6"></i> Testimoni</a>
            <a href="agents.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-users w-6"></i> Data Agen</a>
            <a href="tambah_agen.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-user-plus w-6"></i> Tambah Agen</a>
            <a href="menus.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-bars w-6"></i> Pengaturan Menu</a>
            <a href="settings.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gear w-6"></i> Pengaturan Situs</a>
            <div class="mt-6 pt-6 border-t border-gray-800">
                <a href="/" class="block py-3 px-6 text-gray-400 hover:text-white hover:bg-gray-800">← Lihat Website</a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-900">Data Pendaftaran SPMB</h2>
                <button onclick="fetchSantri()" class="px-4 py-2 bg-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-200 text-sm font-bold transition">
                    <i class="fa-solid fa-rotate-right mr-2"></i> Refresh Data
                </button>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">No</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tanggal Daftar</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama Pendaftar</th>
                                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">L/P</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pilihan Program</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Asal Sekolah</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">No. WhatsApp</th>
                                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Agen Referal</th>
                                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Status Pipeline</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="santri-table-body" class="bg-white divide-y divide-gray-200 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let santriData = [];
    const tableBody = document.getElementById('santri-table-body');

    const fetchSantri = async () => {
        try {
            tableBody.innerHTML = '<tr><td colspan="10" class="text-center py-4 text-gray-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Mengambil data...</td></tr>';
            const res = await fetch('../santri.php');
            const data = await res.json();
            
            if (data.error) {
                let errorHtml = `<div class="text-red-500 font-bold">${data.error}</div>`;
                if (data.details) errorHtml += `<div class="text-xs text-gray-500 mt-1">Detail: ${data.details}</div>`;
                if (data.suggestion) errorHtml += `<div class="text-sm text-blue-600 mt-2 p-2 bg-blue-50 rounded">${data.suggestion}</div>`;
                
                tableBody.innerHTML = `<tr><td colspan="10" class="text-center py-4">${errorHtml}</td></tr>`;
                return;
            }
            
            santriData = data;
            render();
        } catch (err) {
            console.error('Gagal mengambil data:', err);
            tableBody.innerHTML = '<tr><td colspan="10" class="text-center py-4 text-red-500">Gagal terhubung ke API (../santri.php). Pastikan server PHP aktif.</td></tr>';
        }
    };

    const render = () => {
        tableBody.innerHTML = santriData.length ? '' : '<tr><td colspan="10" class="text-center py-4 text-gray-500">Belum ada data pendaftar SPMB.</td></tr>';
        
        santriData.forEach((s, index) => {
            const date = new Date(s.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            const agentBadge = s.agen_name 
                ? `<span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs font-bold rounded-full"><i class="fa-solid fa-user-tie mr-1"></i> ${s.agen_name}</span>`
                : `<span class="px-2 py-1 bg-gray-100 text-gray-500 text-xs rounded-full">Mandiri</span>`;
            
            const jkIcon = s.jenis_kelamin === 'Laki-laki' 
                ? `<i class="fa-solid fa-mars text-blue-500" title="Laki-laki"></i>` 
                : `<i class="fa-solid fa-venus text-pink-500" title="Perempuan"></i>`;

            // CRM Pipeline Status logic
            const currentStatus = s.status || 'Daftar';
            const getStatusColor = (st) => {
                switch(st) {
                    case 'Kunjungan Web': return 'bg-gray-100 text-gray-700 border-gray-300';
                    case 'Ikut Seminar': return 'bg-purple-100 text-purple-700 border-purple-300';
                    case 'Survey': return 'bg-indigo-100 text-indigo-700 border-indigo-300';
                    case 'Daftar': return 'bg-blue-100 text-blue-700 border-blue-300';
                    case 'Test': return 'bg-yellow-100 text-yellow-700 border-yellow-300';
                    case 'Interview': return 'bg-orange-100 text-orange-700 border-orange-300';
                    case 'Daftar Ulang': return 'bg-emerald-100 text-emerald-700 border-emerald-300';
                    default: return 'bg-gray-100 text-gray-700 border-gray-300';
                }
            };
            const statusDropdown = `
                <select onchange="updateStatus(${s.id}, this.value)" class="text-xs font-bold rounded-full px-2 py-1 border outline-none cursor-pointer ${getStatusColor(currentStatus)}">
                    <option value="Kunjungan Web" ${currentStatus === 'Kunjungan Web' ? 'selected' : ''}>Kunjungan Web</option>
                    <option value="Ikut Seminar" ${currentStatus === 'Ikut Seminar' ? 'selected' : ''}>Ikut Seminar</option>
                    <option value="Survey" ${currentStatus === 'Survey' ? 'selected' : ''}>Survey</option>
                    <option value="Daftar" ${currentStatus === 'Daftar' ? 'selected' : ''}>Daftar</option>
                    <option value="Test" ${currentStatus === 'Test' ? 'selected' : ''}>Test</option>
                    <option value="Interview" ${currentStatus === 'Interview' ? 'selected' : ''}>Interview</option>
                    <option value="Daftar Ulang" ${currentStatus === 'Daftar Ulang' ? 'selected' : ''}>Daftar Ulang</option>
                </select>
            `;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-gray-500">${index + 1}</td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-600">${date}</td>
                <td class="px-6 py-4 whitespace-nowrap font-bold text-gray-900">${s.nama}</td>
                <td class="px-6 py-4 whitespace-nowrap text-center text-lg">${jkIcon}</td>
                <td class="px-6 py-4 whitespace-nowrap font-bold text-emerald-700">${s.program || '-'}</td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-500">${s.asal_sekolah || '-'}</td>
                <td class="px-6 py-4 whitespace-nowrap text-gray-500"><a href="https://wa.me/${s.phone.replace(/[^0-9]/g, '')}" target="_blank" class="text-emerald-600 hover:underline"><i class="fa-brands fa-whatsapp"></i> ${s.phone}</a></td>
                <td class="px-6 py-4 whitespace-nowrap text-center">${agentBadge}</td>
                <td class="px-6 py-4 whitespace-nowrap text-center">${statusDropdown}</td>
                <td class="px-6 py-4 whitespace-nowrap text-right font-medium">
                    <button onclick="deleteSantri(${s.id})" class="text-red-600 hover:text-red-900"><i class="fa-solid fa-trash-can"></i> Hapus</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    };

    window.updateStatus = async (id, newStatus) => {
        try {
            const res = await fetch('../santri.php', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, status: newStatus })
            });
            const result = await res.json();
            if(result.success) {
                fetchSantri(); // Refresh warna UI otomatis
            } else {
                alert(result.error || 'Gagal memperbarui status');
            }
        } catch (err) {
            alert('Terjadi kesalahan jaringan atau server PHP tidak merespons.');
        }
    };

    window.deleteSantri = async (id) => {
        if(confirm('Yakin ingin menghapus data pendaftar ini?')) {
            try {
                const res = await fetch('../santri.php?id=' + id, { method: 'DELETE' });
                const result = await res.json();
                if(result.success) fetchSantri();
                else alert(result.error || 'Gagal menghapus data');
            } catch(err) {
                alert('Terjadi kesalahan jaringan atau server PHP tidak merespons.');
            }
        }
    };

    document.addEventListener('DOMContentLoaded', fetchSantri);
</script>
</body>
</html>
