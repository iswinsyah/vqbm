<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Kanban - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .kanban-column { min-width: 320px; max-width: 320px; }
        .kanban-card { cursor: grab; }
        .kanban-card:active { cursor: grabbing; }
        /* Custom scrollbar for Kanban area */
        .kanban-container::-webkit-scrollbar { height: 12px; }
        .kanban-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .kanban-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .kanban-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex overflow-hidden">
    
<aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:block overflow-y-auto">
    <div class="p-6 text-xl font-bold border-b border-gray-800">Dapur Admin</div>
    <nav class="mt-6">
        <a href="index.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gauge w-6"></i> Dashboard</a>
        <a href="spmb.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-user-graduate w-6"></i> Data SPMB (CRM)</a>
        <a href="pipeline.html" class="block py-3 px-6 bg-gray-700 text-white border-l-4 border-emerald-500"><i class="fa-solid fa-table-columns w-6"></i> Pipeline Kanban</a>
        <a href="posts.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-newspaper w-6"></i> Semua Post</a>
        <a href="pages.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-file-lines w-6"></i> Semua Halaman</a>
        <a href="testimonials.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-quote-right w-6"></i> Testimoni</a>
        <a href="agents.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-users w-6"></i> Data Agen</a>
        <a href="menus.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-bars w-6"></i> Pengaturan Menu</a>
        <a href="settings.html" class="block py-3 px-6 hover:bg-gray-800 border-l-4 border-transparent hover:border-emerald-500"><i class="fa-solid fa-gear w-6"></i> Pengaturan Situs</a>
        <div class="mt-6 pt-6 border-t border-gray-800">
            <a href="/" class="block py-3 px-6 text-gray-400 hover:text-white hover:bg-gray-800">← Lihat Website</a>
        </div>
    </nav>
</aside>

<main class="flex-1 flex flex-col h-screen overflow-hidden">
    <div class="p-6 border-b bg-white flex justify-between items-center shadow-sm z-10 flex-shrink-0">
        <h2 class="text-2xl font-bold text-gray-900">Pipeline Kanban SPMB</h2>
        <button onclick="fetchSantri()" class="px-4 py-2 bg-emerald-100 text-emerald-700 rounded-lg hover:bg-emerald-200 text-sm font-bold transition shadow-sm">
            <i class="fa-solid fa-rotate-right mr-2"></i> Refresh Data
        </button>
    </div>

    <div class="flex-1 overflow-x-auto overflow-y-hidden p-6 kanban-container bg-gray-50">
        <div class="flex h-full gap-6 items-start pb-4" id="kanban-board">
            <!-- Kanban columns will be injected here via JS -->
        </div>
    </div>
</main>

<script>
    let santriData = [];
    const statuses = [
        { name: 'Kunjungan Web', color: 'bg-gray-200', border: 'border-gray-300' },
        { name: 'Ikut Seminar', color: 'bg-purple-200', border: 'border-purple-300' },
        { name: 'Survey', color: 'bg-indigo-200', border: 'border-indigo-300' },
        { name: 'Daftar', color: 'bg-blue-200', border: 'border-blue-300' },
        { name: 'Test', color: 'bg-yellow-200', border: 'border-yellow-300' },
        { name: 'Interview', color: 'bg-orange-200', border: 'border-orange-300' },
        { name: 'Daftar Ulang', color: 'bg-emerald-200', border: 'border-emerald-300' }
    ];

    const board = document.getElementById('kanban-board');

    const initBoard = () => {
        board.innerHTML = statuses.map(status => {
            const safeId = status.name.replace(/\s+/g, '-');
            return `
                <div class="kanban-column bg-gray-100 rounded-xl border border-gray-200 shadow-sm flex flex-col h-full max-h-full">
                    <div class="${status.color} ${status.border} border-b px-4 py-3 rounded-t-xl font-bold text-gray-800 flex justify-between items-center">
                        <span>${status.name}</span>
                        <span id="count-${safeId}" class="bg-white/50 text-xs px-2 py-1 rounded-full text-gray-700">0</span>
                    </div>
                    <div class="flex-1 p-3 overflow-y-auto space-y-3 drop-zone" 
                         id="col-${safeId}" 
                         data-status="${status.name}"
                         ondragover="handleDragOver(event)" 
                         ondrop="handleDrop(event, '${status.name}')">
                    </div>
                </div>
            `;
        }).join('');
    };

    const fetchSantri = async () => {
        try {
            const res = await fetch('/santri.php');
            santriData = await res.json();
            renderCards();
        } catch (err) {
            console.error('Gagal mengambil data:', err);
        }
    };

    const renderCards = () => {
        // Reset columns
        statuses.forEach(status => {
            const safeId = status.name.replace(/\s+/g, '-');
            document.getElementById(`col-${safeId}`).innerHTML = '';
            document.getElementById(`count-${safeId}`).innerText = '0';
        });

        // Populate cards
        santriData.forEach(s => {
            const statusName = s.status || 'Daftar';
            const safeId = statusName.replace(/\s+/g, '-');
            const col = document.getElementById(`col-${safeId}`);
            
            if(col) {
                const date = new Date(s.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
                const agentText = s.agen_name ? `<i class="fa-solid fa-user-tie text-blue-500 mr-1"></i>${s.agen_name}` : `<span class="text-gray-400 text-[10px]">Jalur Mandiri</span>`;
                
                const card = document.createElement('div');
                card.className = "kanban-card bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md hover:border-emerald-300 transition group";
                card.draggable = true;
                card.id = `card-${s.id}`;
                card.ondragstart = (e) => handleDragStart(e, s.id);
                card.ondragend = (e) => handleDragEnd(e);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-gray-900 text-sm leading-tight">${s.nama}</h4>
                        <span class="text-[10px] text-gray-400 whitespace-nowrap ml-2">${date}</span>
                    </div>
                    <div class="text-xs text-emerald-600 font-medium mb-3">${s.program || '-'}</div>
                    <div class="flex justify-between items-center text-xs mt-3 pt-3 border-t border-gray-100">
                        <div class="truncate max-w-[140px]">${agentText}</div>
                        <a href="https://wa.me/${s.phone.replace(/[^0-9]/g, '')}" target="_blank" class="text-emerald-600 hover:text-emerald-800 bg-emerald-50 px-2 py-1 rounded transition" title="Hubungi via WA">
                            <i class="fa-brands fa-whatsapp"></i> WA
                        </a>
                    </div>
                `;
                col.appendChild(card);
                
                // Update count
                const countEl = document.getElementById(`count-${safeId}`);
                countEl.innerText = parseInt(countEl.innerText) + 1;
            }
        });
    };

    // Drag and Drop Logic
    let draggedId = null;

    window.handleDragStart = (e, id) => {
        draggedId = id;
        e.currentTarget.classList.add('opacity-50', 'scale-95');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', id); // Required for Firefox
    };

    window.handleDragEnd = (e) => {
        e.currentTarget.classList.remove('opacity-50', 'scale-95');
        draggedId = null;
        document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('bg-gray-200'));
    };

    window.handleDragOver = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const dropZone = e.currentTarget;
        document.querySelectorAll('.drop-zone').forEach(z => {
            if(z !== dropZone) z.classList.remove('bg-gray-200');
        });
        dropZone.classList.add('bg-gray-200');
    };

    window.handleDrop = async (e, newStatus) => {
        e.preventDefault();
        e.currentTarget.classList.remove('bg-gray-200');
        if (!draggedId) return;

        // Optimistic UI Update
        const card = document.getElementById(`card-${draggedId}`);
        const safeId = newStatus.replace(/\s+/g, '-');
        const newCol = document.getElementById(`col-${safeId}`);
        
        if (card && newCol) {
            newCol.appendChild(card);
            
            // Update counts immediately
            const santri = santriData.find(s => s.id == draggedId);
            if (santri) {
                const oldSafeId = (santri.status || 'Daftar').replace(/\s+/g, '-');
                santri.status = newStatus;
                document.getElementById(`count-${oldSafeId}`).innerText = Math.max(0, parseInt(document.getElementById(`count-${oldSafeId}`).innerText) - 1);
                document.getElementById(`count-${safeId}`).innerText = parseInt(document.getElementById(`count-${safeId}`).innerText) + 1;
            }
        }

        // API Call in Background
        try {
            const res = await fetch('/santri.php', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: draggedId, status: newStatus })
            });
            const result = await res.json();
            if(!result.success) {
                alert(result.error || 'Gagal memperbarui status');
                fetchSantri(); // Revert on failure
            }
        } catch (err) {
            alert('Terjadi kesalahan jaringan');
            fetchSantri(); // Revert on failure
        }
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        initBoard();
        fetchSantri();
    });
</script>
</body>
</html>
